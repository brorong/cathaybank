name: Daily Cathay Fund Scraper

on:
  schedule:
    - cron: '35 20,3, * * *' 
  workflow_dispatch:

# 🟢 發給機器人寫入權限
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. 取得程式碼
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 👈 【關鍵修復1】下載完整的歷史紀錄，讓機器人有能力解決版本衝突！

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 還原 Google 金鑰
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > credentials.json

    - name: 5. 執行爬蟲主程式
      run: python cathaylife.py

    - name: 6. 上傳產出的檔案供下載 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: cathay-fund-data
        path: |
          Cathay_Performance_Funds_All.csv
          cathay_funds.db
        retention-days: 7
        
    - name: 7. 將最新資料庫提交並推回 GitHub (Commit & Push)
      run: |
        # 1. 告訴 GitHub 現在是機器人在操作
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # 2. 強制加入爬好的資料庫與 CSV 檔案
        git add -f cathay_funds.db
        git add -f Cathay_Performance_Funds_All.csv
        
        # 3. 檢查檔案是否有變動，若有變動則先打包 (Commit)
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自動更新：每日最新基金淨值與績效"
        
        # 4. 👈 【關鍵修復2】先從雲端拉取(Pull)最新的程式碼並合併，避免版本衝突！
        git pull --rebase origin main
        
        # 5. 安全地將資料推播(Push)回 GitHub
        git push origin main
