<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國泰基金 AI 投資顧問系統</title>
    <style>
        /* =========================================
           🎨 全域與長輩友善基礎設定
           ========================================= */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #f4f7f6; color: #222; }
        
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        
        label { font-size: 18px; font-weight: bold; color: #333; display: block; margin-bottom: 8px; }
        input[type="text"], input[type="number"], select, button { padding: 15px; font-size: 18px; margin-top: 5px; width: 100%; box-sizing: border-box; border: 2px solid #ccc; border-radius: 8px; }
        
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-row > div { flex: 1; min-width: 250px; }
        
        button { background: #00843E; color: white; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,132,62,0.3); transition: 0.2s; margin-top: 20px; }
        button:hover { background: #006b32; transform: translateY(-2px); }
        button:disabled { background: #999; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* =========================================
           ✨ 手機/電腦完美相容的下拉選單
           ========================================= */
        .dropdown-list {
            display: none;
            position: absolute;
            width: 100%;
            max-height: 350px;
            overflow-y: auto;
            background: white;
            border: 2px solid #00843E;
            border-radius: 8px;
            z-index: 9999; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            margin-top: 5px;
            padding: 0;
            list-style: none;
        }
        .dropdown-list li {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 18px;
            color: #333;
        }
        .dropdown-list li:hover, .dropdown-list li:active {
            background-color: #E8F5E9;
            color: #00843E;
            font-weight: bold;
        }

        /* 確保表格滑動不干擾其他介面 */
        .table-responsive { overflow-x: auto; margin-top: 15px; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 16px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background: #00843E; color: white; text-align: center; cursor: pointer; position: relative; user-select: none; }
        th:hover { background: #006b32; }
        th::after { content: " ↕"; font-size: 14px; opacity: 0.6; }
        td:nth-child(1), td:nth-child(2) { text-align: left; }
        
        /* AI 建議區塊 */
        #aiAdvice { display: none; background: #fff; padding: 10px; margin-top: 25px; line-height: 1.8; font-size: 18px; color: #333; }
        .advice-title { color: #00843E; font-size: 26px; border-bottom: 3px solid #00843E; padding-bottom: 10px; margin-top: 0; }
        .intro-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        
        .allocation-card { border: 2px solid #eaeaea; border-radius: 12px; padding: 20px 25px; margin: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .allocation-card.core { border-left: 10px solid #00843E; background-color: #F4FAF6; }
        .allocation-card.satellite { border-left: 10px solid #FF9800; background-color: #FFF8EB; }
        
        .badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; color: white; font-size: 16px; margin-bottom: 12px; }
        .core .badge { background-color: #00843E; }
        .satellite .badge { background-color: #FF9800; }
        .allocation-card h4 { margin: 0 0 10px 0; font-size: 24px; color: #111; }
        .allocation-card p { margin: 0; font-size: 18px; }
        
        .warm-reminder { background-color: #E3F2FD; padding: 18px; border-radius: 10px; font-size: 18px; color: #0277BD; margin-top: 25px; border: 1px solid #BBDEFB; }
    </style>
</head>
<body>
    <h1>📊 國泰基金 AI 投資顧問</h1>

    <div class="card">
        <label for="productInput"><strong>🔍 第一步：搜尋或選擇保險商品：</strong></label>
        
        <div style="position: relative; margin-top: 5px;">
            <div style="display: flex; align-items: center; position: relative;">
                <input type="text" id="productInput" placeholder="⏳ 系統連線中，請稍候..." autocomplete="off" 
                       onchange="loadFunds()" 
                       onkeydown="if(event.key === 'Enter') { document.getElementById('customDropdown').style.display='none'; loadFunds(); }" 
                       style="margin-top: 0; padding-right: 90px;">
                
                <div style="position: absolute; right: 10px; display: flex; gap: 8px;">
                    <button id="clearBtn" onclick="clearProductInput()" style="width: 38px; height: 38px; margin: 0; padding: 0; background: #f4f7f6; color: #888; border-radius: 50%; display: none; box-shadow: none; font-size: 16px; border: 1px solid #ddd;" title="清除文字">✖</button>
                    <button id="toggleBtn" onclick="toggleDropdown(event)" style="width: 38px; height: 38px; margin: 0; padding: 0; background: #00843E; color: white; border-radius: 8px; box-shadow: none; font-size: 16px; border: none;" title="展開完整選單">▼</button>
                </div>
            </div>
            <ul id="customDropdown" class="dropdown-list"></ul>
        </div>
        
        <br><br>
        
        <div class="flex-row">
            <div>
                <label for="strategySelect"><strong>🎯 第二步：選擇投資策略：</strong></label>
                <select id="strategySelect">
                    <option value="平衡">⚖️ 平衡型 (穩健配置)</option>
                    <option value="積極">🔥 積極型 (追求高報酬)</option>
                    <option value="保守">🛡️ 保守型 (保本至上)</option>
                </select>
            </div>
            <div>
                <label for="fundCountInput"><strong>🔢 第三步：配置基金檔數：</strong></label>
                <input type="number" id="fundCountInput" min="1" max="10" value="3" placeholder="請輸入 1~10">
            </div>
        </div>

        <div style="background-color: #E8F5E9; padding: 18px; border-radius: 8px; margin-top: 20px; border: 2px solid #4CAF50;">
            <label style="display: flex; align-items: center; cursor: pointer; margin: 0;">
                <input type="checkbox" id="aiAutoMode" onchange="toggleAutoMode()" style="width: 25px; height: 25px; margin-right: 15px; cursor: pointer;">
                <span style="font-size: 18px; font-weight: bold; color: #00843E;">🤖 啟用「AI 全權委託模式」</span>
            </label>
        </div>
    </div>

    <div class="card" id="fundSection" style="display:none;">
        <h3>📝 可投資基金清單 (點擊表格標題可重新排序)</h3>
        
        <div class="table-responsive">
            <table id="fundTable">
                <thead>
                    <tr>
                        <th onclick="sortBy('基金代碼')">基金代碼</th>
                        <th onclick="sortBy('基金名稱')">基金名稱</th>
                        <th onclick="sortBy('一個月％')">一個月(%)</th>
                        <th onclick="sortBy('三個月％')">三個月(%)</th>
                        <th onclick="sortBy('六個月％')">六個月(%)</th>
                        <th onclick="sortBy('今年來％')">今年來(%)</th>
                        <th onclick="sortBy('一年％')">一年(%)</th>
                        <th onclick="sortBy('二年％')">二年(%)</th>
                        <th onclick="sortBy('三年％')">三年(%)</th>
                        <th onclick="sortBy('五年％')">五年(%)</th>
                        <th onclick="sortBy('成立來％')">成立來(%)</th>
                    </tr>
                </thead>
                <tbody id="fundTableBody"></tbody>
            </table>
        </div>
        
        <button id="aiButton" onclick="getAIAdvice()">🤖 綜合以上條件，產生專屬配置建議</button>
        <div id="aiAdvice"></div>
    </div>

    <script>
        let currentFunds = [];
        let currentSortKey = '一個月％';
        let isDescending = true;
        let allProductsList = []; 

        window.onload = async () => {
            const inputField = document.getElementById('productInput');
            try {
                const res = await fetch('/api/products');
                if (!res.ok) throw new Error("伺服器回應錯誤");
                
                allProductsList = await res.json();
                renderDropdownList(allProductsList); 
                
                inputField.placeholder = "🔍 輸入關鍵字 或 點擊右方箭頭選擇";
                inputField.disabled = false;
            } catch (error) {
                inputField.placeholder = "⚠️ 載入失敗，請檢查後端伺服器";
                inputField.disabled = true;
            }
        };

        function renderDropdownList(list) {
            const ul = document.getElementById('customDropdown');
            ul.innerHTML = '';
            if (list.length === 0) {
                ul.innerHTML = '<li style="color:#999; text-align:center;">找不到符合的保單</li>';
                return;
            }
            list.forEach(p => {
                const li = document.createElement('li');
                li.innerText = p;
                li.onclick = () => {
                    document.getElementById('productInput').value = p;
                    ul.style.display = 'none';
                    checkClearBtn();
                    loadFunds(); // 點擊選項時載入
                };
                ul.appendChild(li);
            });
        }

        function toggleDropdown(event) {
            event.stopPropagation(); 
            const ul = document.getElementById('customDropdown');
            const input = document.getElementById('productInput');
            if (ul.style.display === 'block') {
                ul.style.display = 'none';
            } else {
                renderDropdownList(allProductsList); 
                ul.style.display = 'block';
                input.focus();
            }
        }

        document.getElementById('productInput').addEventListener('input', function() {
            checkClearBtn();
            const keyword = this.value.trim().toLowerCase();
            const filtered = allProductsList.filter(p => p.toLowerCase().includes(keyword));
            renderDropdownList(filtered);
            document.getElementById('customDropdown').style.display = 'block';
        });

        document.addEventListener('click', (event) => {
            if (!event.target.closest('#customDropdown') && event.target.id !== 'productInput' && event.target.id !== 'toggleBtn') {
                document.getElementById('customDropdown').style.display = 'none';
            }
        });

        document.getElementById('productInput').addEventListener('focus', function() {
            if (this.value === '') {
                renderDropdownList(allProductsList);
                document.getElementById('customDropdown').style.display = 'block';
            }
        });

        function checkClearBtn() {
            const input = document.getElementById('productInput');
            const btn = document.getElementById('clearBtn');
            btn.style.display = input.value.length > 0 ? 'block' : 'none';
        }

        function clearProductInput() {
            const input = document.getElementById('productInput');
            input.value = '';
            document.getElementById('clearBtn').style.display = 'none';
            document.getElementById('fundSection').style.display = 'none';
            renderDropdownList(allProductsList);
            document.getElementById('customDropdown').style.display = 'block';
            input.focus();
        }

        function toggleAutoMode() {
            const isAuto = document.getElementById('aiAutoMode').checked;
            const strategySelect = document.getElementById('strategySelect');
            const fundCountInput = document.getElementById('fundCountInput');
            const aiButton = document.getElementById('aiButton');

            if (isAuto) {
                strategySelect.disabled = true;
                fundCountInput.disabled = true;
                strategySelect.style.backgroundColor = '#f0f0f0';
                fundCountInput.style.backgroundColor = '#f0f0f0';
                aiButton.innerText = "🚀 啟動 AI 全權委託分析";
            } else {
                strategySelect.disabled = false;
                fundCountInput.disabled = false;
                strategySelect.style.backgroundColor = '#fff';
                fundCountInput.style.backgroundColor = '#fff';
                aiButton.innerText = "🤖 綜合以上條件，產生專屬配置建議";
            }
        }

        async function loadFunds() {
            const product = document.getElementById('productInput').value;
            if (!product) return;

            try {
                const res = await fetch(`/api/funds?product=${encodeURIComponent(product)}`);
                currentFunds = await res.json();
                
                currentSortKey = '一個月％';
                isDescending = true;
                renderTable(); 
                
                // 確保讀取完畢後，將表格區塊顯示出來
                document.getElementById('fundSection').style.display = 'block';
                document.getElementById('aiAdvice').style.display = 'none';
            } catch (error) { 
                console.error("載入基金失敗:", error); 
            }
        }

        function sortBy(key) {
            if (currentSortKey === key) {
                isDescending = !isDescending;
            } else {
                currentSortKey = key;
                isDescending = true;
            }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('fundTableBody');
            tbody.innerHTML = '';

            if (currentFunds.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; color:#d9534f; font-weight:bold;">找不到關聯基金。</td></tr>';
                return;
            }

            let sortedFunds = [...currentFunds];
            sortedFunds.sort((a, b) => {
                let valA = a[currentSortKey];
                let valB = b[currentSortKey];

                if (currentSortKey.includes('％') || currentSortKey.includes('月') || currentSortKey.includes('年')) {
                    let numA = parseFloat(valA);
                    let numB = parseFloat(valB);
                    if (isNaN(numA)) numA = -999999;
                    if (isNaN(numB)) numB = -999999;
                    return isDescending ? (numB - numA) : (numA - numB);
                } else {
                    valA = valA || '';
                    valB = valB || '';
                    return isDescending ? valB.localeCompare(valA) : valA.localeCompare(valB);
                }
            });

            sortedFunds.forEach(f => {
                tbody.innerHTML += `<tr>
                    <td><strong>${f['基金代碼']}</strong></td>
                    <td>${f['基金名稱']}</td>
                    <td>${f['一個月％'] || '-'}</td>
                    <td>${f['三個月％'] || '-'}</td>
                    <td>${f['六個月％'] || '-'}</td>
                    <td>${f['今年來％'] || '-'}</td>
                    <td>${f['一年％'] || '-'}</td>
                    <td>${f['二年％'] || '-'}</td>
                    <td>${f['三年％'] || '-'}</td>
                    <td>${f['五年％'] || '-'}</td>
                    <td style="color:#d9534f; font-weight:bold;">${f['成立來％'] || '-'}</td>
                </tr>`;
            });
        }

        async function getAIAdvice() {
            const adviceDiv = document.getElementById('aiAdvice');
            const aiButton = document.getElementById('aiButton');
            const isAuto = document.getElementById('aiAutoMode').checked;
            
            adviceDiv.style.display = 'block';
            adviceDiv.innerHTML = "<em>⏳ 專家 AI 正在讀取龐大市場數據進行深度運算，請稍候 (約 5~10 秒)...</em>";
            
            aiButton.disabled = true;
            aiButton.innerText = "分析中，請稍候...";

            const fundDataForAI = currentFunds.map(f => {
                return `- ${f['基金代碼']} ${f['基金名稱']} | 近1個月:${f['一個月％']}% | 近6個月:${f['六個月％']}% | 近1年:${f['一年％']}% | 成立來:${f['成立來％']}%`;
            }).join('\n');

            const payload = {
                product: document.getElementById('productInput').value,
                strategy: isAuto ? "AI決定" : document.getElementById('strategySelect').value,
                fundCount: isAuto ? "AI決定" : document.getElementById('fundCountInput').value,
                funds: fundDataForAI
            };

            try {
                const res = await fetch('/api/advice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if(data.advice) {
                    adviceDiv.innerHTML = data.advice;
                } else {
                    adviceDiv.innerHTML = "<span style='color:red;'>⚠️ 分析失敗，請檢查系統日誌。</span>";
                }
            } catch (error) {
                console.error("AI 分析失敗:", error);
                adviceDiv.innerHTML = "<span style='color:red;'>⚠️ 無法連線至 AI 伺服器，請稍後再試。</span>";
            } finally {
                aiButton.disabled = false;
                aiButton.innerText = isAuto ? "🚀 重新啟動 AI 全權委託分析" : "🤖 重新產生 AI 專屬配置建議";
            }
        }
    </script>
</body>
</html>
